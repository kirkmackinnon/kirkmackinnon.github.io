<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 1200 200"
     preserveAspectRatio="none">

  <path id="kmcurve1"
        d="M0 120 C200 20, 400 20, 600 120 S1000 220, 1200 120"
        stroke="#5a7c99"
        stroke-width="2"
        fill="none" />

  <path id="kmcurve2"
        d="M0 120 C220 90, 420 90, 620 120 S1020 150, 1200 120"
        stroke="#7a8f6a"
        stroke-width="2"
        fill="none"
        opacity="0.7" />

  <circle r="5" fill="#5a7c99">
    <animateMotion dur="8s" repeatCount="indefinite">
      <mpath href="#kmcurve1" />
    </animateMotion>
  </circle>
  <circle r="5" fill="#7a8f6a">
    <animateMotion dur="8s" repeatCount="indefinite">
      <mpath href="#kmcurve2" />
    </animateMotion>
  </circle>

</svg>